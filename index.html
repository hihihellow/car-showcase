<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>澄品汽車</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
  <div class="header-top">
    <div class="header-top-inner">
      <div class="brand-wrap">
        <div class="brand-text-group">
          <div class="brand-main-title">桃園優質中古車</div>
          <div class="brand-sub-title">桃園市八德區廣興路1191號</div>
        </div>
      </div>

      <div class="header-actions">
        <a href="login.html" class="header-btn btn-login">登入</a>
        <a href="login.html" class="header-btn btn-register">註冊</a>
      </div>
    </div>
  </div>

  <div class="header-nav">
    <div class="header-nav-inner">
      <div class="header-nav-title">桃園優質中古車</div>

      <nav class="nav-menu">
        <a href="#homeSection" class="nav-link active">首頁</a>
        <a href="#carSection" class="nav-link">車輛</a>
        <a href="#serviceSection" class="nav-link">服務</a>
        <a href="#aboutSection" class="nav-link">關於我們</a>
      </nav>
    </div>
  </div>
</header>

<section class="hero" id="homeSection">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-text">
      <h1>優質車輛買賣平台</h1>
      <p>嚴選優質中古車，線上賞車更方便，快速找到理想車款。</p>
      <a href="#carSection" class="hero-main-btn">立即賞車</a>
    </div>
  </div>
</section>

<section class="features">
  <div class="feature-card">
    <div class="feature-icon">🛡️</div>
    <h3>嚴選車況</h3>
    <p>嚴選車源，提供完整資訊與透明展示，讓你看車更安心。</p>
  </div>

  <div class="feature-card">
    <div class="feature-icon">🖼️</div>
    <h3>多圖展示</h3>
    <p>每台車都能查看更多角度照片，外觀內裝一次掌握。</p>
  </div>

  <div class="feature-card">
    <div class="feature-icon">🔎</div>
    <h3>快速找車</h3>
    <p>可依品牌、分類、地區與價格篩選，更快找到理想車款。</p>
  </div>
</section>
  </section>

  <section class="section-title">
    <h2>全部車輛</h2>
    <p>歡迎瀏覽目前上架中的精選車款</p>
  </section>

  <section id="carSection">
    <section class="filters">
      <input
        type="text"
        id="searchInput"
        placeholder="搜尋品牌或車名，例如 Toyota、Altis"
      />

      <select id="categoryFilter">
        <option value="all">全部分類</option>
        <option value="轎車">轎車</option>
        <option value="休旅車">休旅車</option>
        <option value="掀背車">掀背車</option>
      </select>

      <select id="regionFilter">
        <option value="all">全部地區</option>
        <option value="台北市">台北市</option>
        <option value="新北市">新北市</option>
        <option value="桃園市">桃園市</option>
        <option value="台中市">台中市</option>
      </select>

      <select id="priceFilter">
        <option value="all">全部價格</option>
        <option value="0-300000">30萬以下</option>
        <option value="300001-500000">30萬-50萬</option>
        <option value="500001-800000">50萬-80萬</option>
        <option value="800001-9999999">80萬以上</option>
      </select>
    </section>

    <main>
      <div id="carList" class="car-list"></div>
    </main>
  </section>
  <section class="section-title" id="serviceSection">
    <h2>服務</h2>
    <p>提供快速找車、車況展示與後續功能擴充。</p>
  </section>

  <section class="section-title" id="aboutSection">
    <h2>關於我們</h2>
    <p>晉嘉精選車庫，專注於中古車展示與平台體驗。</p>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
<link rel="icon" href="/favicon.ico" />
