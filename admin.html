<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我要賣車</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
  <h1>車輛管理後台</h1>
  <p>在這裡新增你的車輛資料</p>
  </header>

  <section class="post-form">
    <h2>新增車輛</h2>

    <input id="titleInput" placeholder="車名，例如 Toyota Altis 2020" />
    <input id="priceInput" placeholder="價格，例如 450000" />
    <input id="regionInput" placeholder="地區，例如 新北市" />
    <input id="categoryInput" placeholder="分類，例如 轎車" />
    <label for="imageInput">上傳照片（可選多張）</label>
    <input id="imageInput" type="file" accept="image/*" multiple />
    <input id="descInput" placeholder="簡介，例如 車況良好" />

    <button id="addCarBtn">送出</button>
  </section>

  <section class="post-entry">
    <a href="index.html" class="post-link-btn">返回前台首頁</a>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
