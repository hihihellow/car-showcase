<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重設密碼｜澄品汽車</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-shell" style="max-width: 520px; margin: 60px auto;">
      <div class="auth-panel" style="width: 100%;">
        <div class="auth-brand">澄品會員中心</div>

        <form id="resetPasswordForm" class="auth-form">
          <div class="auth-form-title">重設密碼</div>

          <label class="auth-label" for="newPassword">新密碼</label>
          <div class="password-field">
            <input
              type="password"
              id="newPassword"
              class="auth-input password-input"
              placeholder="請輸入至少 6 碼密碼"
              required
            />
            <button type="button" class="toggle-password" data-target="newPassword">👁</button>
          </div>

          <label class="auth-label" for="confirmNewPassword">確認新密碼</label>
          <div class="password-field">
            <input
              type="password"
              id="confirmNewPassword"
              class="auth-input password-input"
              placeholder="請再次輸入新密碼"
              required
            />
            <button type="button" class="toggle-password" data-target="confirmNewPassword">👁</button>
          </div>

          <button type="submit" class="auth-submit-btn">更新密碼</button>

          <p class="auth-switch-text">
            <a href="login.html" class="inline-switch-btn">返回登入</a>
          </p>
        </form>

        <p id="resetMessage" class="auth-message"></p>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://sszyqmgrlxpwonfidkcr.supabase.co",
      "sb_publishable_DxGd6Yu_mXB1YqiUTxJdqA_CT17Rv27"
    );

    const resetPasswordForm = document.getElementById("resetPasswordForm");
    const resetMessage = document.getElementById("resetMessage");

    function showMessage(text, isError = false) {
      resetMessage.textContent = text;
      resetMessage.classList.toggle("error", isError);
      resetMessage.classList.toggle("success", !isError && text !== "");
    }

    function bindPasswordToggle() {
      const toggleButtons = document.querySelectorAll(".toggle-password");

      toggleButtons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();

          const targetId = btn.dataset.target;
          const input = document.getElementById(targetId);

          if (!input) return;

          const isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          btn.textContent = isHidden ? "🙈" : "👁";
        });
      });
    }

    bindPasswordToggle();

    resetPasswordForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById("newPassword").value;
      const confirmNewPassword = document.getElementById("confirmNewPassword").value;

      if (newPassword.length < 6) {
        showMessage("密碼長度至少要 6 碼。", true);
        return;
      }

      if (newPassword !== confirmNewPassword) {
        showMessage("兩次輸入的新密碼不一致。", true);
        return;
      }

      const { error } = await supabase.auth.updateUser({
        password: newPassword
      });

      if (error) {
        showMessage("更新密碼失敗：" + error.message, true);
        return;
      }

      showMessage("密碼更新成功，正在返回登入頁...", false);

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    });
  </script>
</body>
</html>
