<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會員中心｜澄品汽車</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="member.style.css" />
  <link rel="stylesheet" href="chat.style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="header-top-inner">
        <div class="brand-wrap"></div>

        <nav class="top-nav-menu">
          <a href="index.html#homeSection" class="nav-link">首頁</a>
          <a href="index.html#carSection" class="nav-link">車輛</a>
          <a href="index.html#serviceSection" class="nav-link">服務</a>
          <a href="index.html#aboutSection" class="nav-link">關於我們</a>
        </nav>

        <div class="header-actions" id="headerActions">
          <div class="chat-bell-wrap user-only">
            <button id="buyerChatBell" class="chat-bell-btn" type="button">
              🔔 <span id="buyerChatBellBadge" class="chat-bell-badge hidden">0</span>
            </button>

            <div id="buyerBellDropdown" class="chat-bell-dropdown hidden"></div>
          </div>
          <a href="login.html" class="header-btn btn-login guest-only hidden">登入</a>
          <a href="login.html" class="header-btn btn-register guest-only hidden">註冊</a>

          <a href="member.html" class="header-btn btn-login user-only" id="memberCenterBtn">會員中心</a>
          <button type="button" class="header-btn btn-register user-only" id="logoutBtn">登出</button>
        </div>

        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="開啟選單">
          <strong>MENU</strong>
        </button>
      </div>

      <div class="mobile-drawer" id="mobileDrawer">
        <a href="index.html#homeSection" class="mobile-drawer-link">首頁</a>
        <a href="index.html#carSection" class="mobile-drawer-link">車輛</a>
        <a href="index.html#serviceSection" class="mobile-drawer-link">服務</a>
        <a href="index.html#aboutSection" class="mobile-drawer-link">關於我們</a>

        <div class="mobile-drawer-actions">
          <a href="member.html" class="header-btn btn-login">會員中心</a>
          <button type="button" class="header-btn btn-register" id="logoutBtnMobile">登出</button>
        </div>
      </div>
    </div>
  </header>

  <main class="member-layout">

    <!-- 左邊選單 -->
    <aside class="member-sidebar">
      <h3>會員中心</h3>
      <ul>
        <li class="active" data-tab="profile">基本資料</li>
        <li data-tab="favorites">我的收藏</li>
        <li data-tab="recent">最近瀏覽</li>
        <li data-tab="followedStores">追蹤的車行</li>
        <li data-tab="chat">
          聊天室 <span id="buyerChatBadge" class="chat-badge hidden">0</span>
        </li>
        <li data-tab="notifications">
          通知中心
        </li>
      </ul>
    </aside>

    <!-- 右邊內容 -->
    <section class="member-content">

      <div id="profileTab" class="tab active">
        <h2>基本資料</h2>
        <p id="userName"></p>
        <p id="userEmail"></p>
        <p id="userPhone"></p>
      </div>

      <div id="notificationsTab" class="tab">
        <h2>通知中心</h2>
        <div id="buyerNotificationList" class="notification-list"></div>
      </div>

      <div id="favoritesTab" class="tab">
        <h2>我的收藏</h2>
        <div id="favoriteList" class="car-list"></div>
      </div>

      <div id="recentTab" class="tab">
        <h2>最近瀏覽</h2>
        <div id="recentViewList" class="car-list"></div>
      </div>

      <div id="followedStoresTab" class="tab">
        <h2>我的追蹤車行</h2>
        <div id="followedStoreList"></div>
      </div>

      <div id="chatTab" class="tab">
        <div class="chat-page-title">
          <h2>聊天</h2>
          <p>查看你與車行的詢問紀錄</p>
        </div>

        <div class="buyer-chat-layout messenger-style">
          <div class="chat-list-panel">
            <div class="chat-list-top">
              <h3>訊息</h3>
              <button type="button" class="chat-compose-btn" title="訊息">
                <i class="fa-solid fa-message"></i>
              </button>
            </div>

            <div id="buyerChatList" class="seller-chat-list"></div>
          </div>

          <div id="buyerChatRoom" class="buyer-chat-room">
            <p class="chat-empty-text">選擇左側聊天室開始對話</p>
          </div>
        </div>
      </div>

    </section>

  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
