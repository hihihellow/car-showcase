<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會員中心｜澄品汽車</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="header-top-inner">

        <div class="brand-wrap">
          <a href="index.html">
            <img src="images/logo.png" class="brand-logo">
          </a>
        </div>

        <nav class="top-nav-menu">
          <a href="index.html#homeSection" class="nav-link">首頁</a>
          <a href="index.html#carSection" class="nav-link">車輛</a>
          <a href="index.html#serviceSection" class="nav-link">服務</a>
          <a href="index.html#aboutSection" class="nav-link">關於我們</a>
        </nav>

        <div class="header-actions">
          <a href="member.html" id="memberCenterBtn" class="header-btn btn-login">會員中心</a>
          <button id="logoutBtn" class="header-btn btn-register">登出</button>
        </div>

      </div>
    </div>
  </header>

  <main class="member-layout">

    <!-- 左邊選單 -->
    <aside class="member-sidebar">
      <h3>會員中心</h3>
      <ul>
        <li class="active" data-tab="profile">基本資料</li>
        <li data-tab="favorites">我的收藏</li>
        <li data-tab="chat">聊天室</li>
      </ul>
    </aside>

    <!-- 右邊內容 -->
    <section class="member-content">

      <div id="profileTab" class="tab active">
        <h2>基本資料</h2>
        <p id="userEmail"></p>
      </div>

      <div id="favoritesTab" class="tab">
        <h2>我的收藏</h2>
        <div id="favoriteList"></div>
      </div>

     <div id="chatTab" class="tab">
        <h2>聊天室</h2>
        <p>尚未開始聊天</p>
      </div>

    </section>

  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
